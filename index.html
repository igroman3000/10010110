<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCapture Key Decoder</title>
    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .window {
            background-color: #141414;
            border: 1px solid #333333;
            width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }
        .title {
            font-size: 11px;
            font-weight: bold;
            color: #808080;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-box {
            width: 100%;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            padding: 8px 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        .btn-decode {
            width: 100%;
            background-color: #00ffff;
            color: #000000;
            border: none;
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .result-area {
            background-color: #1a1a1a;
            border: 1px solid #252525;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            min-height: 110px;
            box-sizing: border-box;
            margin-bottom: 20px;
            white-space: pre-wrap;
            color: #aaaaaa;
        }
        .btn-close {
            display: block;
            width: 120px;
            margin: 0 auto;
            background-color: #2d2d2d;
            color: #ffffff;
            border: none;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="title">Вставьте маркер для дешифровки:</div>
    <input type="text" id="keyInput" class="input-box" placeholder="KEY-XXXX-XXXX-XXXX-XXXX">
    
    <button id="decodeBtn" class="btn-decode">Дешифровать и проверить</button>
    
    <div class="title">Результат анализа:</div>
    <div id="resultArea" class="result-area">Ожидание ввода...</div>
    
    <button class="btn-close" onclick="window.close();">Выход</button>
</div>

<script>
    document.getElementById('decodeBtn').addEventListener('click', () => {
        const input = document.getElementById('keyInput').value.trim().toUpperCase();
        const resultArea = document.getElementById('resultArea');
        
        if (!input) {
            resultArea.textContent = "Ошибка: Поле ввода пустое.";
            resultArea.style.color = "#ff4500";
            return;
        }

        const parts = input.split('-');
        
        // Валидация структуры
        if (parts.length !== 5 || parts[0] !== 'KEY') {
            resultArea.textContent = "СТАТУС: ОШИБКА\n\nНеверный формат структуры.\nШаблон: KEY-XXXX-XXXX-XXXX-XXXX";
            resultArea.style.color = "#ff4500";
            return;
        }

        // Регулярное выражение для проверки шестнадцатеричных символов (0-9, A-F)
        const hexRegex = /^[0-9A-F]{4}$/;
        if (!hexRegex.test(parts[1]) || !hexRegex.test(parts[2]) || !hexRegex.test(parts[3]) || !hexRegex.test(parts[4])) {
            resultArea.textContent = "СТАТУС: КРИТИЧЕСКАЯ ОШИБКА\n\nОбнаружены недопустимые не-HEX символы в блоках ключа.";
            resultArea.style.color = "#ff4500";
            return;
        }

        // Парсинг блоков
        const b1 = parseInt(parts[1], 16);
        const b2 = parseInt(parts[2], 16);
        const b3 = parseInt(parts[3], 16);
        const b4 = parseInt(parts[4], 16);

        resultArea.style.color = "#32cd32";
        resultArea.textContent = 
            `СТАТУС: УСПЕШНО ДЕШИФРОВАН\n\n` +
            `Структура: Валидна\n` +
            `Блок 1 (DEC): ${b1}\n` +
            `Блок 2 (DEC): ${b2}\n` +
            `Блок 3 (DEC): ${b3}\n` +
            `Блок 4 (DEC): ${b4}`;
    });
</script>

</body>
</html>
